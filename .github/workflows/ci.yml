name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage (3.12 only)
        if: matrix.python-version == '3.12'
        run: |
          pytest --cov=sdgft --cov-report=term-missing --cov-report=xml

      - name: Verify module summaries
        run: |
          python -m sdgft.qm.atomic_spectra
          python -m sdgft.qm.qed_vertex
          python -m sdgft.qm.neutrino_osc
